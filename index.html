<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>CNCjs Tablet</title>
    <meta name="theme-color" content="#0d0d14" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&display=swap" />
    <!--
      socket.io is loaded from the CNCjs server at runtime.
      During development, Vite proxies /socket.io → http://localhost:8000.
      In production (mounted via CNCjs mountPoints), this resolves to the CNCjs server.
    -->
    <script src="/socket.io/socket.io.js"></script>
  </head>
  <body class="bg-[#0d0d14] text-slate-100 overflow-hidden">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
